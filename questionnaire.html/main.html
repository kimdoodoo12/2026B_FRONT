<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
</head>
<body> 
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRpK_gA2YwZz2IN-X_hyg_tcHFh614Vto8B7gDHztPBHg&s=10">
    <h1> 학교 생활 설문조사</h1>
    <br />
    <table border="5">
        <tr>
            <td>
                학번
            </td>
            <td>
                <input type="text">
            </td>
            <td>
                이름
            </td>
            <td>
                <input type="text">
            </td>
            <td>
                학과
            </td>
            <td>
                <input type="text">
            </td>
        </tr>
        <tr>
            <td>
                전화번호
            </td>
            <td colspan="6">
                <input type="tel" placeholder="010-1111-1111">
            </td>
        </tr>
    </table>
    <p>
        성별 <select>
            <option> 남자 </option>
            <option> 여자 </option>
            <option> 트랜스마스쿨린 </option>
            <option> 트랜스페미닌 </option>
            <option> 안드로진 </option>
            <option> 바이젠더 </option>
            <option> 트라이젠더 </option>
            <option> 뉴트로이스 </option>
            <option> 에이젠더 </option>
            <option> 젠더리스 </option>
            <option> 데미젠더 </option>
            <option> 폴리젠더 </option>
            <option> 팬젠더 </option>
            <option> 젠더플루이드 </option>
            <option> 젠더플럭스 </option>
            <option> 기타 </option>
        </select>
        학년 <select>
            <option> 1학년 </option>
            <option> 2학년 </option>
            <option> 3학년 </option>
            <option> 4학년 </option>
            <option> 5학년 </option>
            <option> 6학년 </option>
        </select>
    </p>
    <p>
        나이 <input type="range">
    </p>
    

    <div>
        <table>
            <tr>
                <td>
                    당신은 친구가 얼마나 있습니까?
                </td>
                <td>
                    <input type="radio"> 예
                </td>
                <td>
                    <input type="radio"> 아니오
                </td>
            </tr>
            <tr>
                <td>
                    당신은 밥을 얼마나 혼자 먹습니까?
                </td>
                <td>
                    <input type="radio" name="meal"> 자주
                </td>
                <td>
                    <input type="radio" name="meal"> 적게
                </td>
                <td>
                    <input type="radio" name="meal"> 많이
                </td>
            </tr>
            <tr>
                <td>
                    흡연을 많이 하십니까?
                </td>
                <td>
                    <input type="radio"> 예
                </td>
                <td>
                    <input type="radio"> 아니오
                </td>
            </tr>
        </table>
    </div>
</body>
