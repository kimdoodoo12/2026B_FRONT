<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
</head>
<body>
    <form>

    <div>
        <h3>카테고리
        <select name="category" id="category">
            <option>공지사항</option>
            <option>자유게시판</option>
            <option>질문게시판</option> 
        </select>
        </h3>
    </div>

    <div>
        <input type="text" placeholder="작성자">
        <input type="password" placeholder="비밀번호">
    </div>
    <hr />
    <div>
        <input type="text" placeholder="게시물 제목 입력">
    </div>
    <hr />
    <div>
        <textarea rows="20" cols="50" placeholder="게시물 내용 입력"></textarea>
    </div>

    <div>
        공개선택
        <input type="radio" name="appear"> 공개글 <input type="radio" name="appear"> 비공개글 <br />
        공유선택
        <input type="checkbox" name="share"> 카카오톡 <input type="checkbox" name="share"> 트위터 <input type="checkbox" name="share"> 네이버카페 <br />
        작성일자
        <input type="date">
        작성시간
        <input type="time">
    </div>
    <hr />

    <div>
        첨부파일
        <input type="file">
    </div>

    <br />
    <div>
        <button>목록보기</button>
        <button type="submit">글쓰기</button>
        <button type="reset">다시쓰기</button>
    </div>


    </form>

</body>

</html>
